spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codepath}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:codepath}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:codepath}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

jwt.secret=${JWT_SECRET:dev-secret-min-32-characters-here}
jwt.expiration=86400000

admin.seed.username=${ADMIN_SEED_USERNAME:admin}
admin.seed.password=${ADMIN_SEED_PASSWORD:admin123}

# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:codepath}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:codepath}

# Suppress Spring Security AuthenticationManager warning
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR