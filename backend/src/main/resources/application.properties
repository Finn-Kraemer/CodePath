spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codepath}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:codepath}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:codepath}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

jwt.secret=${JWT_SECRET:dev-secret-min-32-characters-here}
jwt.expiration=86400000

admin.seed.username=${ADMIN_SEED_USERNAME:admin}
admin.seed.password=${ADMIN_SEED_PASSWORD:admin123}